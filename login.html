<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
        .login-container { background: #fff; padding: 40px 30px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .login-container h2 { margin-bottom: 20px; color: #2c5364; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-size: 13px; color: #555; }
        .input-group input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #2c5364; box-shadow: 0 0 5px rgba(44,83,100,0.4); }
        .login-btn { width: 100%; padding: 10px; background: #2c5364; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-bottom: 10px; }
        .login-btn:hover { background: #203a43; }
        .signup-btn { width: 100%; padding: 10px; background: transparent; border: 2px solid #2c5364; color: #2c5364; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .signup-btn:hover { background: #2c5364; color: #fff; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Welcome</h2>

        <!-- CHANGE 1: Add action="/", method="GET", and target="_parent" -->
        <!-- This tells the form to refresh the main Streamlit page and put the data in the URL -->
        <form action="/" method="GET" target="_parent">
            
            <div class="input-group">
                <label>Email ID</label>
                <!-- CHANGE 2: Add name="email" -->
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <!-- CHANGE 3: Add name="password" -->
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Ensure this button has type="submit" -->
            <button type="submit" class="login-btn">Login</button>
            <button type="button" class="signup-btn">Sign Up</button>
        </form>
    </div>
</body>
</html>
